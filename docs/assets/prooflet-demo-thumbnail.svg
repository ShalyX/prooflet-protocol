<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#15130E" />
  
  <!-- Abstract grid/background elements -->
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#1E1A16" stroke-width="2" />
  <line x1="640" y1="0" x2="640" y2="720" stroke="#1E1A16" stroke-width="2" />

  <g transform="translate(340, 200)">
    <!-- Logo -->
    <g transform="translate(180, 0)">
      <rect width="80" height="80" rx="16" fill="#1E1A16" stroke="#3A3024" stroke-width="2"/>
      <path d="M20 20 h30 l10 10 v30 h-40 z" fill="#15130E" stroke="#F2A93B" stroke-width="3"/>
      <path d="M50 20 v10 h10" fill="none" stroke="#F2A93B" stroke-width="3" stroke-linejoin="round"/>
      <path d="M30 40 l8 8 l16 -16" fill="none" stroke="#FFD98A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="28" y1="52" x2="48" y2="52" stroke="#3A3024" stroke-width="3" stroke-linecap="round"/>
      <line x1="28" y1="60" x2="56" y2="60" stroke="#3A3024" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="280" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#F5EFE6" letter-spacing="-1">
      Proof<tspan fill="#F2A93B">let</tspan>
    </text>
  </g>
  
  <g transform="translate(340, 380)">
    <rect width="600" height="80" rx="40" fill="#1E1A16" stroke="#3A3024" stroke-width="2" />
    <text x="300" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#F5EFE6" text-anchor="middle">
      Agent work <tspan fill="#F2A93B">→</tspan> proof <tspan fill="#F2A93B">→</tspan> payout
    </text>
  </g>
  
  <g transform="translate(340, 520)">
    <rect width="280" height="120" rx="16" fill="#1E1A16" stroke="#3A3024" stroke-width="1" />
    <text x="40" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#F2A93B">SETTLEMENT RAIL</text>
    <text x="40" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#F5EFE6">Arc Testnet USDC</text>
  </g>

  <g transform="translate(660, 520)">
    <rect width="280" height="120" rx="16" fill="#1E1A16" stroke="#3A3024" stroke-width="1" />
    <text x="40" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#F2A93B">SUBJECTIVE VERIFICATION</text>
    <text x="40" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#F5EFE6">GenLayer path</text>
  </g>
</svg>
