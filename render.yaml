services:
  - type: web
    name: prooflet-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node --no-warnings server/api.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: SETTLEMENT_MODE
        value: "off"
      - key: ADJUDICATION_MODE
        value: manual
      - key: UWP_DB_PATH
        value: /tmp/prooflet.sqlite
      - key: TREASURY_ADDRESS
        value: 0x709F18F797347FbB8D53Fb60567892751dd14B11
      # Free Neon cutover (set in Render dashboard only — never commit secrets):
      # - DATABASE_URL = Neon pooled connection string (sslmode=require)
      # - Leave unset until PROOFLET_POSTGRES_API_READY code path is complete
      # - PROOFLET_DURABILITY_PROVEN=true only after restart-survival evidence
      - key: DATABASE_URL
        sync: false
      - key: PROOFLET_POSTGRES_API_READY
        value: "false"
      - key: PROOFLET_DURABILITY_PROVEN
        value: "false"
