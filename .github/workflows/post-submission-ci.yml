name: Post-submission CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "post-submission/**"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prooflet
          POSTGRES_PASSWORD: prooflet
          POSTGRES_DB: prooflet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prooflet -d prooflet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://prooflet:prooflet@127.0.0.1:5432/prooflet_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run post-submission:check
      - run: npm audit --omit=dev --audit-level=high
      - name: Check committed whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --check "$BASE_SHA...$GITHUB_SHA"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "$BEFORE_SHA...$GITHUB_SHA"
          else
            git show --check --format= "$GITHUB_SHA"
          fi
